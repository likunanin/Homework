<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>Service Request Form</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>

<div class="form-container">
    <div class="logo">⭐ABC Solutions</div>
    <h1>SERVICE REQUEST FORM</h1>

    <!-- Customer Information -->
    <section>
        <h2>Customer Information:</h2>
        <div class="row">
            <div class="field">
                <label>Customer Name:</label>
                <input type="text">
            </div>
            <div class="field">
                <label>Contact Number:</label>
                <input type="text">
            </div>
        </div>

        <div class="row">
            <div class="field">
                <label>Home Address:</label>
                <input type="text">
            </div>
            <div class="field">
                <label>Email Address:</label>
                <input type="email">
            </div>
        </div>
    </section>

    <!-- Service Request Details -->
    <section>
        <h2>Service Request Details:</h2>

        <label>Requested:</label>
        <div class="radio-group">
            <label><input type="radio" name="service"> Repair</label>
            <label><input type="radio" name="service"> Maintenance</label>
            <label><input type="radio" name="service"> Installation</label>
            <label><input type="radio" name="service"> Other</label>
        </div>

        <div class="field full">
            <label>Description of Service Requested:</label>
            <textarea rows="3"></textarea>
        </div>

        <div class="field">
            <label>Date and Time Requested:</label>
            <input type="date">
        </div>

        <label>Urgency Level:</label>
        <div class="radio-group">
            <label><input type="radio" name="urgency"> Low</label>
            <label><input type="radio" name="urgency"> Medium</label>
            <label><input type="radio" name="urgency"> High</label>
            <label><input type="radio" name="urgency"> Emergency</label>
        </div>
    </section>

    <!-- Approval -->
    <section>
        <h2>Approval:</h2>
        <div class="row">
            <div class="field">
                <label>Applicant Name:</label>
                <input type="text">
            </div>
            <div class="field">
                <label>Request Submission Date:</label>
                <input type="date">
            </div>
        </div>
    </section>

    <!-- Service Personnel -->
    <section>
        <h2>Service Personnel:</h2>
        <div class="row">
            <div class="field">
                <label>Completed By:</label>
                <input type="text">
            </div>
            <div class="field">
                <label>Date:</label>
                <input type="date">
            </div>
        </div>

        <div class="row">
            <div class="field">
                <label>Approved By:</label>
                <input type="text">
            </div>
            <div class="field">
                <label>Date:</label>
                <input type="date">
            </div>
        </div>
    </section>

</div>

</body>
</html>
